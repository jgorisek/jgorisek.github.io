<a class="skip-link" href="#main">Skip to content</a>
<header class="site-header" data-site-header>
  <nav class="nav-shell" aria-label="Primary navigation">
    <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} home">
      <span class="brand-mark">JG</span>
      <span class="brand-text">{{ site.title }}</span>
    </a>
    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="primary-menu" data-nav-toggle>
      <span class="nav-toggle-line"></span>
      <span class="nav-toggle-line"></span>
      <span class="nav-toggle-line"></span>
      <span class="sr-only">Menu</span>
    </button>
    <div class="nav-links" id="primary-menu" data-nav-menu>
      {% for item in site.data.navigation %}
        <a href="{{ item.url | relative_url }}" {% if page.url == item.url %}aria-current="page"{% endif %}>{{ item.label }}</a>
      {% endfor %}
    </div>
  </nav>
</header>
