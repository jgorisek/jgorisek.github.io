title: "Jakob Gorisek"
description: "Personal website for CV, photography, projects, publications, writing, and contact links."
url: "https://jgorisek.github.io"
baseurl: ""
lang: "en"
timezone: "Europe/Ljubljana"

permalink: /blog/:title/

collections:
  projects:
    output: true
    permalink: /projects/:name/
  publications:
    output: true
    permalink: /publications/:name/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
  - scope:
      path: ""
      type: "publications"
    values:
      layout: "publication"

markdown: kramdown

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
